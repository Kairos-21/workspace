<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人工作台</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 顶部导航栏 -->
    <header class="header">
        <h1 class="header-title">📋 个人工作台</h1>
        <div class="header-actions">
            <button class="btn btn-secondary" id="bgBtn" title="更换背景">🎨 背景</button>
            <button class="btn btn-secondary" id="importBtn" title="导入数据">📥 导入</button>
            <button class="btn btn-secondary" id="exportBtn" title="导出数据">📤 导出</button>
        </div>
    </header>
    <input type="file" id="importFile" accept=".json" style="display: none;">

    <!-- 主内容区 -->
    <main class="main-container">
        <!-- 第一行：待办事项 + 日历 + 番茄钟 -->
        <section class="row row-top">
            <!-- 待办事项模块 -->
            <div class="module todo-module" id="todoModule">
                <div class="module-header">
                    <h2 class="module-title">📝 <span id="todoDateDisplay">今天</span></h2>
                    <button class="btn btn-primary btn-sm" id="addTodoBtn">+ 新增</button>
                </div>
                <div class="module-content">
                    <div class="todo-input-wrapper">
                        <input type="text" id="todoInput" class="todo-input" placeholder="输入待办事项，按回车添加...">
                        <select id="todoPriority" class="priority-select">
                            <option value="medium">中优先级</option>
                            <option value="high">高优先级</option>
                            <option value="low">低优先级</option>
                        </select>
                    </div>
                    <ul class="todo-list" id="todoList"></ul>
                </div>
            </div>

            <!-- 日历模块 -->
            <div class="module calendar-module" id="calendarModule">
                <div class="module-header">
                    <h2 class="module-title">📅 日历</h2>
                    <div class="calendar-nav">
                        <button class="btn btn-sm" id="jumpModeBtn" title="跳转待办事项">📍 跳转</button>
                        <button class="btn btn-icon" id="prevWeek">◀</button>
                        <span class="current-month" id="currentMonth"></span>
                        <button class="btn btn-icon" id="nextWeek">▶</button>
                    </div>
                </div>
                <div class="module-content">
                    <div class="calendar-grid" id="calendarGrid">
                        <div class="calendar-header">
                            <span>周一</span><span>周二</span><span>周三</span><span>周四</span><span>周五</span><span>周六</span><span>周日</span>
                        </div>
                        <div class="calendar-body" id="calendarBody"></div>
                    </div>
                </div>
            </div>

            <!-- 番茄钟模块 -->
            <div class="module pomodoro-module" id="pomodoroModule">
                <div class="module-header">
                    <h2 class="module-title">🍅 番茄钟</h2>
                    <button class="btn btn-icon btn-sm" id="pomodoroSettingsBtn" title="设置">⚙️</button>
                </div>
                <div class="module-content">
                    <div class="pomodoro-container">
                        <div class="pomodoro-circle" id="pomodoroCircle">
                            <svg class="progress-ring" viewBox="0 0 200 200">
                                <circle class="progress-ring-bg" cx="100" cy="100" r="90"/>
                                <circle class="progress-ring-progress" cx="100" cy="100" r="90" id="progressRing"/>
                            </svg>
                            <div class="pomodoro-time" id="pomodoroTime">25:00</div>
                            <div class="pomodoro-status" id="pomodoroStatus">工作</div>
                        </div>
                        <div class="pomodoro-info">
                            <span class="pomodoro-count">🍅 <span id="currentCount">0</span> / <span id="totalCount">4</span></span>
                        </div>
                        <div class="pomodoro-controls">
                            <button class="btn btn-primary" id="pomodoroStartBtn">▶ 开始</button>
                            <button class="btn btn-secondary" id="pomodoroResetBtn">⟳ 重置</button>
                        </div>
                        <div class="pomodoro-settings-panel" id="pomodoroSettingsPanel" style="display: none;">
                            <div class="setting-item">
                                <label>工作时长: <span id="workDurationVal">25</span>分钟</label>
                                <input type="range" id="workDuration" min="1" max="60" value="25">
                            </div>
                            <div class="setting-item">
                                <label>短休息: <span id="shortBreakVal">5</span>分钟</label>
                                <input type="range" id="shortBreak" min="0" max="30" value="5">
                            </div>
                            <div class="setting-item">
                                <label>长休息: <span id="longBreakVal">15</span>分钟</label>
                                <input type="range" id="longBreak" min="0" max="60" value="15">
                            </div>
                            <div class="setting-item">
                                <label>长休息间隔: <span id="longBreakIntervalVal">4</span>个</label>
                                <input type="range" id="longBreakInterval" min="2" max="8" value="4">
                            </div>
                            <div class="setting-item">
                                <label>目标个数: <span id="targetCountVal">4</span>个</label>
                                <input type="range" id="targetCount" min="1" max="16" value="4">
                            </div>
                            <div class="setting-item">
                                <label><input type="checkbox" id="soundEnabled" checked> 声音提醒</label>
                            </div>
                            <div class="setting-item">
                                <label>提示音音量: <span id="soundVolumeVal">80</span>%</label>
                                <input type="range" id="soundVolume" min="0" max="100" value="80">
                            </div>
                            <div class="setting-item sound-management" id="soundManagement" style="flex-direction: column; align-items: flex-start;">
                                <label style="margin-bottom: 8px;">提示音管理:</label>
                                <div id="soundList" style="width: 100%; margin-bottom: 8px;"></div>
                                <input type="file" id="soundUploadInput" accept="audio/mpeg,audio/mp3,audio/wav,audio/ogg,audio/m4a,audio/aac" style="display: none;">
                                <button class="btn btn-sm" id="soundUploadBtn" style="width: 100%;">➕ 添加自定义提示音</button>
                                <small style="color: var(--text-secondary); font-size: 0.75rem; margin-top: 4px;">支持 MP3、WAV、OGG、M4A 格式</small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 第二行：常用工具 -->
        <section class="row row-middle">
            <div class="module shortcuts-module" id="shortcutsModule">
                <div class="module-header">
                    <h2 class="module-title">🔗 常用工具</h2>
                    <div class="header-buttons">
                        <button class="btn btn-primary btn-sm" id="addShortcutBtn">+ 添加</button>
                        <button class="btn btn-sm" id="addFolderBtn">📁 新建文件夹</button>
                    </div>
                </div>
                <div class="module-content">
                    <div class="shortcuts-grid" id="shortcutsGrid"></div>
                </div>
            </div>
        </section>

        <!-- 第三行：备忘录 -->
        <section class="row row-bottom">
            <div class="module memo-module" id="memoModule">
                <div class="module-header">
                    <h2 class="module-title">📄 备忘录</h2>
                    <div class="memo-tabs">
                        <div class="memo-tabs-list" id="memoTabsList"></div>
                        <button class="btn btn-sm" id="addMemoBtn">+ 新建</button>
                    </div>
                </div>
                <div class="module-content">
                    <div class="memo-content" id="memoContent"></div>
                </div>
            </div>
        </section>
    </main>

    <!-- 通用弹窗 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">标题</h3>
                <button class="modal-close" id="modalClose">×</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer" id="modalFooter"></div>
        </div>
    </div>

    <!-- Toast 提示 -->
    <div class="toast" id="toast"></div>
